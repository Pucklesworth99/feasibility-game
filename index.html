<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feasibility — tap to drill. Find the gold.</title>
    <meta name="description" content="Tap to drill. Watch the core come up. Did we hit? A gold exploration game with real geology underneath." />
  </head>
  <body>
    <div id="app">
      <header class="topbar g1-bar">
        <div class="brand">
          <h1>FEASIBILITY</h1>
          <button id="seed-chip" class="chip" title="Copy a challenge link — same ground, their taps.">
            <span class="chip-label">TENEMENT</span> <span id="seed-name"></span>
          </button>
        </div>
        <div class="topstats">
          <div class="g1-cash">
            <span class="k">BUDGET</span>
            <span class="v" id="cash-val">—</span>
            <div class="meter g1-meter"><div class="meter-fill" id="cash-fill"></div></div>
          </div>
          <div class="g1-oz">
            <span class="k">GOLD FOUND</span>
            <span class="v gold" id="oz-counter">0 oz</span>
          </div>
          <button id="btn-fresh" class="btn btn-ghost" title="New ground, same budget.">New tenement</button>
          <button id="btn-mute" class="btn btn-ghost btn-mute" title="Sound on/off">🔊</button>
        </div>
      </header>

      <section class="map-panel" id="map-wrap">
        <canvas id="map"></canvas>
      </section>

      <div id="finger" class="finger hidden">👆<span class="finger-label">TAP TO DRILL</span></div>

      <div class="overlay hidden" id="broke">
        <div class="modal broke-modal">
          <h2>BUDGET GONE.</h2>
          <p class="sub" id="broke-oz"></p>
          <div class="modal-actions">
            <button class="btn btn-primary" id="btn-broke-fresh">Fresh tenement</button>
          </div>
        </div>
      </div>

      <footer class="footer">
        <span>Gate 1 — the drill test. Real geology underneath.</span>
      </footer>
    </div>
    <script type="module">
      // Broke-modal reset shares the main fresh-tenement button's handler.
      document.getElementById('btn-broke-fresh').addEventListener('click', () => {
        document.getElementById('btn-fresh').click();
      });
    </script>
    <script type="module" src="/src/gate1.ts"></script>
  </body>
</html>
